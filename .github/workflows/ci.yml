name: InfraOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r infraos-backend/requirements.txt
      - name: Check imports
        run: PYTHONPATH=infraos-backend python -m compileall infraos-backend

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: infraos-ui/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: infraos-ui
      - name: Build UI
        run: npm run build
        working-directory: infraos-ui
